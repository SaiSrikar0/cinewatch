version: "3.9"

services:
  cinewatch:
    build: .
    container_name: cinewatch
    restart: unless-stopped          # auto-restart on crash; stop only on explicit docker stop

    environment:
      MOVIE_NAME: "${MOVIE_NAME:-Spider-Man: Brand New Day}"
      CITY: "${CITY:-Hyderabad}"
      CHECK_INTERVAL_SECONDS: "${CHECK_INTERVAL_SECONDS:-300}"
      HEADLESS: "${HEADLESS:-true}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      SNAPSHOT_FILE: "${SNAPSHOT_FILE:-/app/data/snapshot.json}"

    volumes:
      - cinewatch_data:/app/data     # persistent snapshot + logs

    # Shared memory for Chromium (prevents crashes in containers)
    shm_size: "2gb"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cinewatch_data:
